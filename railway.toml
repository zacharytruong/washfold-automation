[build]
builder = "dockerfile"
volumes = [ "/app/data" ] # Mount persistent volume

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000

# Volume: Mount persistent storage at /app/data for SQLite logs
# Configure in Railway dashboard: Settings → Volumes → Add Volume
# Mount path: /app/data
# Set env var: DATA_DIR=/app/data
